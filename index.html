<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Oaty Date Power Bowl | Natural Energy</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b2b23",
                        "primary-container": "#994237",
                        "tertiary": "#005127",
                        "on-surface-variant": "#53433f",
                        "surface-container": "#f3ede4",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Work Sans', sans-serif; background-color: #fff9ef; color: #1d1b16; margin: 0; padding: 0; overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Epilogue', sans-serif; }
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            position: relative;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            max-width: 80%;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 25px;
            color: white;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }

        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: auto;
            margin-top: -22px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 16px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            user-select: none;
        }

        .next {
            right: 10px;
        }

        .prev {
            left: 10px;
        }
    </style>
</head>
<body class="selection:bg-primary-container selection:text-white">

<nav class="bg-[#fff9ef]/90 backdrop-blur-md sticky top-0 z-50 border-b border-black/5 w-full">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <span class="text-2xl font-black text-primary tracking-tighter">Oaty Date</span>
        <div class="hidden md:flex items-center space-x-10 text-sm font-bold uppercase tracking-widest text-on-surface-variant">
            <a href="#" class="hover:text-primary transition-colors">Story</a>
            <a href="#" class="hover:text-primary transition-colors">Nutrition</a>
            <a href="#" class="hover:text-primary transition-colors">Shop</a>
        </div>
        <button class="bg-primary text-white px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest">BUY NOW</button>
    </div>
</nav>

<section class="relative px-6 py-12 md:py-24 lg:py-32">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        <div class="text-center lg:text-left order-2 lg:order-1">
            <span class="inline-block text-tertiary font-black tracking-[0.3em] uppercase text-[10px] md:text-xs mb-4">Editorial Nourishment</span>
            <h1 class="text-5xl sm:text-7xl lg:text-8xl font-black leading-[0.9] tracking-tighter mb-6 uppercase">
                Oaty Date <br/> <span class="text-primary">Power Bowl</span>
            </h1>
            <p class="text-base md:text-xl text-on-surface-variant max-w-lg mx-auto lg:mx-0 mb-8 leading-relaxed">
                A premium apothecary-grade blend of ancient grains and organic dates designed for sustained vitality.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                <button class="bg-primary text-white px-10 py-5 rounded-full font-black uppercase text-sm shadow-xl shadow-primary/20">Shop Starter Kit</button>
                <button class="border border-primary/20 text-primary px-10 py-5 rounded-full font-black uppercase text-sm hover:bg-white transition-all">View Flavors</button>
            </div>
        </div>

        <div class="relative order-1 lg:order-2 flex justify-center">
            <div class="absolute inset-0 bg-primary-container/10 rounded-full blur-[100px] scale-90"></div>
            <div class="relative w-full max-w-[300px] sm:max-w-[400px] lg:max-w-full aspect-square">
                <img alt="Power Bowl" class="w-full h-full object-cover rounded-full shadow-2xl border-[10px] border-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfigmTG-RlFPuAq-v3eXM3LYs8o6NAL7fbjJ4mkST0RRbo_3sMGIQkgOTnvPn6akjDf0KRRuWscoX0x3keetjxbFBo_6GbA7LLhZzK8a9lr_OacyXZYhkuwKdC23v9ZCNufH6SbO2D_JnxnMZPpN99KratQexosEDT1iFh6AobEOACz36LDev-cEXQWP0IzLT38E60BBmw1YdQIqpPGgZzXwdbCPcsnO1z3nA2uAmoZPWR2_iVTFmkusm24lqDoIep_XSei1qu6hg"/>
                <div class="absolute top-4 right-4 bg-tertiary text-white h-20 w-20 md:h-28 md:w-28 rounded-full flex flex-col items-center justify-center rotate-12 shadow-2xl ring-4 ring-white/30">
                    <span class="text-[8px] md:text-[10px] font-bold uppercase">100%</span>
                    <span class="text-xl md:text-3xl font-black">BIO</span>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="bg-surface-container py-16 md:py-24 px-6">
    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-20">
            <div class="lg:col-span-7 grid grid-cols-2 gap-4">
                <!-- Updated images with modal implementation -->
                <div class="col-span-2 md:col-span-1 md:row-span-2">
                    <img src="front_back.png" class="w-full h-full object-cover rounded-2xl shadow-lg border-4 border-white modal-trigger" alt="Front" onclick="openModal(0)">
                </div>
                <div class="aspect-square">
                    <img src="back.png" class="w-full h-full object-cover rounded-2xl shadow-md border-4 border-white modal-trigger" alt="Lifestyle" onclick="openModal(1)">
                </div>
                <div class="aspect-square">
                    <img src="front.png" class="w-full h-full object-cover rounded-2xl shadow-md border-4 border-white modal-trigger" alt="Back" onclick="openModal(2)">
                </div>
            </div>
            <!-- Modal HTML structure -->
            <div id="imageModal" class="modal">
                <span class="close" onclick="closeModal()">&times;</span>
                <div class="modal-content">
                    <img id="modalImage" class="object-cover w-full" src="">
                    <a class="prev" onclick="changeImage(-1)">&#10094;</a>
                    <a class="next" onclick="changeImage(1)">&#10095;</a>
                </div>
            </div>

            <div class="lg:col-span-5 flex flex-col justify-center">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-tertiary text-white text-[9px] font-black px-2 py-1 rounded tracking-tighter uppercase">In Stock</span>
                    <div class="flex text-primary"><span class="material-symbols-outlined text-sm">star</span><span class="material-symbols-outlined text-sm">star</span><span class="material-symbols-outlined text-sm">star</span></div>
                </div>
                <h2 class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-4 leading-none">Oaty Date <br><span class="text-primary">Power Bowl</span></h2>
                <p class="text-2xl font-bold mb-8">₱150.00 <span class="text-xs font-medium opacity-50">/ 60g Pouch</span></p>
            </div>
        </div>
    </div>
</section>

    <!-- JavaScript -->
    <script>
        const images = ["front_back.png", "back.png", "front.png"];
        let currentIndex = 0;

        function openModal(index) {
            currentIndex = index;
            document.getElementById("imageModal").style.display = "block";
            document.getElementById("modalImage").src = images[currentIndex];
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }

        function changeImage(direction) {
            currentIndex = (currentIndex + direction + images.length) % images.length;
            document.getElementById("modalImage").src = images[currentIndex];
        }
    </script>
</body>
</html>
